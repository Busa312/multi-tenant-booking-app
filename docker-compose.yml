name: multi-tenant-booking-app

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
      POSTGRES_DB: booking
    ports:
      # Host-side 5433 (not 5432) to avoid clashing with a native Postgres
      # install on the host; container-to-container traffic (e.g. the api
      # service, via DATABASE_URL=...@postgres:5432) is unaffected.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates the RLS-bound `booking_app` runtime role on first init — see the file for why.
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "pnpm --filter @booking/api prisma:generate && pnpm --filter @booking/api dev"
    working_dir: /workspace
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://booking:booking@postgres:5432/booking?schema=public
      APP_DATABASE_URL: postgresql://booking_app:booking_app@postgres:5432/booking?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  cms:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "pnpm --filter @booking/cms dev -- --host"
    working_dir: /workspace
    env_file:
      - apps/cms/.env
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - api

  public-site:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "pnpm --filter @booking/public-site dev"
    working_dir: /workspace
    env_file:
      - apps/public-site/.env
    environment:
      API_URL: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
